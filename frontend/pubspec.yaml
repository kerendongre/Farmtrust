name: farmtrust
description: FarmTrust - Organic Farmer Marketplace
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Navigation
  go_router: ^10.0.0
  
  # Firebase
  firebase_core: ^2.17.0
  firebase_auth: ^4.10.0
  firebase_messaging: ^14.6.0
  firebase_storage: ^11.2.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # UI & Design
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.0
  animated_text_kit: ^4.2.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.4.0
  
  # Geolocation
  geolocator: ^9.0.0
  google_maps_flutter: ^2.5.0
  
  # Local Database
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.0
  image_picker: ^1.0.0
  video_player: ^2.7.0
  
  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter: ^3.0.0
  build_runner: ^2.4.0
  freezed_annotation: ^2.4.0

flutte:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
